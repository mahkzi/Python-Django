{% extends "base.html" %}
{% block title_head %}Cambiar Contraseña{% endblock title_head %}
{% block header_h1 %}Cambiar Contraseña{% endblock header_h1 %}
{% block mostrar_info %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <form method="post">
                {% csrf_token %}
                {{ form }}
                <button type="submit" class="btn btn-warning">Actualizar Contraseña</button>
                <a href="{% url 'usuarios:editar_perfil' %}" class="btn btn-secondary">Cancelar</a>
            </form>
        </div>
    </div>
</div>
{% endblock mostrar_info %}
{% block content %}{% endblock content %}
